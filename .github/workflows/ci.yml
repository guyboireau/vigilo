name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://mock-url.supabase.co
          VITE_SUPABASE_ANON_KEY: mock-anon-key
          VITE_GITHUB_CLIENT_ID: mock
          VITE_GITLAB_CLIENT_ID: mock
          VITE_VERCEL_CLIENT_ID: mock
